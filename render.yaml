services:
  - type: web
    name: envconfig-service
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port 10000
    envVars:
      - key: THEME_COLOR
        value: emerald
      - key: APP_MODE
        value: production
      - key: BUILD_NUMBER
        value: "996"
